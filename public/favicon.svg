<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <style>
      @media (prefers-color-scheme: light) {
        .bg { fill: #1a1a24; }
        .letters { fill: #e8e8f0; }
      }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0a0a0f; }
        .letters { fill: #e8e8f0; }
      }
    </style>
  </defs>
  <rect class="bg" width="128" height="128" rx="24" />
  <text class="letters" x="64" y="64" font-family="'JetBrains Mono','SF Mono','Fira Code',monospace" font-weight="700" font-size="52" text-anchor="middle" dominant-baseline="central" letter-spacing="-2">WB</text>
</svg>
